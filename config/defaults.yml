# claude-workflows configuration
# Edit this file to configure workflows for your project.
# Documentation: https://github.com/ragaa07/claude-workflows

version: "1.0"  # Config schema version (not package version)

# ============================================================
# Project Identity
# ============================================================
project:
  name: "My Project"                   # Your project name
  type: "generic"                      # android | react | python | generic
  language: ""                         # Primary language (kotlin, typescript, python, etc.)
  team: ""                             # Team name (e.g., "android", "ios", "backend")

# ============================================================
# Git Flow Configuration
# ============================================================
git:
  branches:
    main: "main"                       # Production branch
    development: "develop"             # Development/integration branch
    feature: "feature/{name}"          # Feature branch pattern ({name} replaced)
    bugfix: "bugfix/{name}"            # Bugfix branch pattern
    hotfix: "hotfix/{name}"            # Hotfix branch pattern
    release: "release/v{version}"      # Release branch pattern ({version} replaced)

  commits:
    format: "conventional"             # conventional | angular | simple
    # conventional: feat: | fix: | refactor: | chore: | docs: | test: | style: | perf:
    # angular: feat(scope): | fix(scope):
    # simple: Free-form messages
    types: [feat, fix, refactor, test, docs, chore, style, perf]
    scopes: true                       # Allow scopes in commit messages
    ticket_reference: false            # Require ticket ID in commits

  pr:
    base_branch: "develop"             # Default PR target branch
    draft: false                       # Create PRs as drafts
    reviewers: []                      # Auto-assign reviewers
    labels: []                         # Auto-apply labels
    template: |
      ## Summary
      {summary}

      ## Changes
      {changes}

      ## Test Plan
      {test_plan}

      ## Checklist
      - [ ] Code compiles
      - [ ] Tests pass
      - [ ] No breaking changes

  merge:
    strategy: "squash"                 # squash | merge | rebase
    delete_branch: true                # Delete branch after merge

  protected:                           # Branches that require PR (warn on direct commit)
    - "main"
    - "master"
    - "develop"

# ============================================================
# Workflow Configuration
# ============================================================
workflows:
  new-feature:
    require_spec: true                 # Must create spec before planning
    require_tests: true                # Must write tests before PR
    require_brainstorm: true           # Run brainstorm phase

  extend-feature:
    require_brainstorm: true
    require_tests: true

  hotfix:
    base_branch: ""                    # Empty = use git.branches.main
    require_tests: true                # Always true for hotfixes — regression test is mandatory

  refactor:
    require_brainstorm: true
    require_tests: true

  release:
    changelog: true                    # Generate changelog entries
    tag_format: "v{version}"           # Git tag format

  review:
    standards: []                      # Custom review checklist items
    checklist: "auto"                  # auto (detect from project.language) | none | path
    auto_self_review: false            # Chain self-review before PR

  migrate:
    require_brainstorm: true

  ci-fix: {}

  test:
    default_coverage: 90
    default_type: "unit"

  brainstorm:
    default_depth: "standard"          # quick | standard | deep
    techniques:                        # Available techniques
      - "trade-off-matrix"
      - "six-thinking-hats"
      - "scamper"
      - "reverse-brainstorm"
      - "constraint-mapping"

# ============================================================
# State Management
# ============================================================
state:
  directory: ".workflows"              # Where workflow state is stored
  history: true                        # Keep completed workflow history
  max_history: 50                      # Max history entries to keep

# ============================================================
# Skill Configuration
# ============================================================
skills:
  disabled: []                         # Skills to disable (by name)
  aliases:                             # Command aliases
    build: "new-feature"               # /workflow:build → /workflow:new-feature
    fix: "hotfix"                      # /workflow:fix → /workflow:hotfix
    ship: "release"                    # /workflow:ship → /workflow:release

# ============================================================
# Workflow Composition (Chaining)
# ============================================================
chains:
  new-feature:
    TEST: "/workflow:test"             # Chain test workflow during TEST phase
  extend-feature:
    TEST: "/workflow:test"
  refactor:
    VERIFY: "/workflow:test --full-suite"

# ============================================================
# Safety Guards
# ============================================================
guards:
  enabled: false                       # Enable with --with-guards during install
  config: ".claude/guards.yml"         # Path to guards configuration

# ============================================================
# Auto-Learning
# ============================================================
learning:
  enabled: true                        # Auto-capture patterns from completed workflows
  min_confidence: 0.5                  # Minimum confidence to surface in brainstorming
  storage: ".workflows/learned"        # Where learned patterns are stored

# ============================================================
# Quality Gate
# ============================================================
quality:
  self_review: true                    # Run review checklists before PR creation
  review_checklists:                   # Loaded in order; all applicable checks run
    - "general-checklist.md"           # Always loaded
    # Language-specific checklist auto-detected from project.language
