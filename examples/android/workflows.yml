# claude-workflows configuration — Android/Kotlin (4Sale)
# This example matches the 4Sale project conventions.
# Documentation: https://github.com/4SaleTech/claude-workflows

version: "1.0"

# ============================================================
# Project Identity
# ============================================================
project:
  name: "4Sale Android"
  type: "android"
  language: "kotlin"

# ============================================================
# Git Flow Configuration
# ============================================================
git:
  branches:
    main: "Production"
    development: "Development"
    feature: "alpha-feature/{name}"
    bugfix: "bugfix/{name}"
    hotfix: "hotfix/{name}"
    release: "ch-feature/Bumb_app_version_to_{version}"

  commits:
    format: "conventional"
    types: [feat, fix, refactor, test, docs, chore, style, perf]
    scopes: true

  pr:
    base_branch: "Development"
    draft: false
    template: |
      ## Summary
      {summary}

      ## Changes
      {changes}

      ## Test Plan
      {test_plan}

      ## Checklist
      - [ ] Code compiles (`./gradlew compileForSaleDebugKotlin`)
      - [ ] Tests pass (`./gradlew testForSaleDebugUnitTest`)
      - [ ] No breaking changes
      - [ ] Design system components used (not raw Material3)

  merge:
    strategy: "squash"
    delete_branch: true

  protected: ["Production", "Development"]

# ============================================================
# Workflow Configuration
# ============================================================
workflows:
  new-feature:
    require_spec: true
    require_tests: true
    require_brainstorm: true

  hotfix:
    base_branch: "Production"
    require_tests: false

  release:
    changelog: true
    tag_format: "v{version}"

  review:
    standards:
      - "Follows MVVM + Clean Architecture"
      - "Uses CondorTheme design system components"
      - "No hardcoded strings (use string resources)"
      - "Proper error handling with ForSaleDataResult"
      - "Nullable API response fields"
      - "Repository interface + Default implementation"

  brainstorm:
    default_depth: "standard"

# ============================================================
# State Management
# ============================================================
state:
  directory: ".workflows"
  history: true

# ============================================================
# Skill Configuration
# ============================================================
skills:
  aliases:
    build: "new-feature"
    fix: "hotfix"
    ship: "release"
