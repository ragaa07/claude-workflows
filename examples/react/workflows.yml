# claude-workflows configuration — React/TypeScript
# GitHub Flow branching model (main + feature branches).
# Documentation: https://github.com/4SaleTech/claude-workflows

version: "1.0"

# ============================================================
# Project Identity
# ============================================================
project:
  name: "My React App"
  type: "react"
  language: "typescript"

# ============================================================
# Git Flow Configuration
# ============================================================
git:
  branches:
    main: "main"
    development: "main"                  # GitHub Flow: no separate dev branch
    feature: "feature/{name}"
    bugfix: "fix/{name}"
    hotfix: "hotfix/{name}"
    release: "release/v{version}"

  commits:
    format: "conventional"
    types: [feat, fix, refactor, test, docs, chore, style, perf, ci]
    scopes: true
    ticket_reference: false

  pr:
    base_branch: "main"
    draft: false
    reviewers: []
    labels: []
    template: |
      ## Summary
      {summary}

      ## Changes
      {changes}

      ## Test Plan
      {test_plan}

      ## Screenshots
      <!-- Attach before/after screenshots for UI changes -->

      ## Checklist
      - [ ] TypeScript compiles (`npm run build`)
      - [ ] Tests pass (`npm test`)
      - [ ] ESLint passes (`npm run lint`)
      - [ ] No console.log left in production code
      - [ ] Accessibility checked (keyboard nav, screen reader)

  merge:
    strategy: "squash"
    delete_branch: true

  protected:
    - "main"

# ============================================================
# Workflow Configuration
# ============================================================
workflows:
  new-feature:
    require_spec: true
    require_tests: true
    require_brainstorm: true

  extend-feature:
    require_brainstorm: true
    require_tests: true

  hotfix:
    base_branch: "main"
    require_tests: false

  refactor:
    require_brainstorm: true
    require_tests: true

  release:
    changelog: true
    tag_format: "v{version}"

  review:
    standards:
      - "Components use functional style with hooks"
      - "State managed via React Query / Zustand (not prop drilling)"
      - "No inline styles (use CSS modules or Tailwind)"
      - "Proper error boundaries for async components"
      - "All user-facing strings use i18n"
      - "Accessible: proper ARIA roles, keyboard navigation"

  brainstorm:
    default_depth: "standard"
    techniques:
      - "trade-off-matrix"
      - "six-thinking-hats"
      - "scamper"
      - "reverse-brainstorm"
      - "constraint-mapping"

# ============================================================
# State Management
# ============================================================
state:
  directory: ".workflows"
  history: true
  max_history: 50

# ============================================================
# Skill Configuration
# ============================================================
skills:
  aliases:
    build: "new-feature"
    fix: "hotfix"
    ship: "release"
