# claude-workflows configuration — Python
# Trunk-based development with short-lived feature branches.
# Documentation: https://github.com/4SaleTech/claude-workflows

version: "1.0"

# ============================================================
# Project Identity
# ============================================================
project:
  name: "My Python Project"
  type: "python"
  language: "python"

# ============================================================
# Git Flow Configuration
# ============================================================
git:
  branches:
    main: "main"
    development: "main"                  # Trunk-based: features branch from main
    feature: "feature/{name}"
    bugfix: "fix/{name}"
    hotfix: "hotfix/{name}"
    release: "release/v{version}"

  commits:
    format: "conventional"
    types: [feat, fix, refactor, test, docs, chore, style, perf, ci]
    scopes: true
    ticket_reference: false

  pr:
    base_branch: "main"
    draft: false
    reviewers: []
    labels: []
    template: |
      ## Summary
      {summary}

      ## Changes
      {changes}

      ## Test Plan
      {test_plan}

      ## Checklist
      - [ ] Tests pass (`pytest`)
      - [ ] Type checks pass (`mypy .`)
      - [ ] Linting passes (`ruff check .`)
      - [ ] Formatting verified (`black --check .`)
      - [ ] No secrets or credentials in code

  merge:
    strategy: "squash"
    delete_branch: true

  protected:
    - "main"

# ============================================================
# Workflow Configuration
# ============================================================
workflows:
  new-feature:
    require_spec: true
    require_tests: true
    require_brainstorm: true

  extend-feature:
    require_brainstorm: true
    require_tests: true

  hotfix:
    base_branch: "main"
    require_tests: false

  refactor:
    require_brainstorm: true
    require_tests: true

  release:
    changelog: true
    tag_format: "v{version}"

  review:
    standards:
      - "Type hints on all public functions"
      - "Docstrings on all public classes and functions"
      - "No bare except clauses"
      - "Use pathlib over os.path"
      - "Async functions where I/O bound"
      - "Pydantic models for data validation"

  brainstorm:
    default_depth: "standard"
    techniques:
      - "trade-off-matrix"
      - "six-thinking-hats"
      - "scamper"
      - "reverse-brainstorm"
      - "constraint-mapping"

# ============================================================
# State Management
# ============================================================
state:
  directory: ".workflows"
  history: true
  max_history: 50

# ============================================================
# Skill Configuration
# ============================================================
skills:
  aliases:
    build: "new-feature"
    fix: "hotfix"
    ship: "release"
